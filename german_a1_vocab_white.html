<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>German A1 Vocabulary</title>
<style>
  :root {
    --bg: #ffffff;
    --card: #f7f7f7;
    --card2: #efefef;
    --border: #cccccc;
    --text: #111111;
    --muted: #555555;
    --accent: #000000;
    --learned: #999999;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  header { background: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid var(--accent); }
  header h1 { font-size: 1.25rem; font-weight: 700; color: #000; letter-spacing: 0.5px; }
  header span { background: var(--card2); color: #000; font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); }

  .stats { display: flex; gap: 10px; padding: 12px 16px; background: #f0f0f0; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .stat-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 0.78rem; color: var(--muted); }
  .stat-item b { color: #000; font-size: 1rem; display: block; }

  .controls { padding: 14px 16px; display: flex; gap: 10px; flex-wrap: wrap; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
  .search-box { flex: 1; min-width: 200px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 0.9rem; outline: none; }
  .search-box:focus { border-color: #000; }
  .filter-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--muted); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .filter-btn.active { background: #000; border-color: #000; color: #fff; font-weight: 600; }

  .select-row { display: flex; gap: 10px; padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .dropdown { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.82rem; cursor: pointer; outline: none; flex: 1; min-width: 160px; }
  .dropdown:focus { border-color: #000; }

  .content { padding: 16px; }
  .category-block { margin-bottom: 22px; }
  .category-title { font-size: 0.78rem; font-weight: 700; color: #000; text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 0; margin-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .category-count { background: var(--card2); color: var(--muted); font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; letter-spacing: 0; text-transform: none; font-weight: 500; border: 1px solid var(--border); }

  .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .word-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; transition: all 0.2s; position: relative; }
  .word-card:hover { border-color: #000; }
  .word-card.learned { border-color: var(--learned); background: #ececec; opacity: 0.8; }
  .word-card.learned .badge { display: flex; }

  .badge { display: none; position: absolute; top: 8px; right: 8px; background: #000; color: #fff; font-size: 0.62rem; padding: 2px 7px; border-radius: 10px; align-items: center; gap: 3px; font-weight: 700; }

  .german-word { font-size: 1rem; font-weight: 600; color: #000; margin-bottom: 4px; }
  .article-badge { font-size: 0.7rem; padding: 1px 7px; border-radius: 8px; margin-right: 5px; font-weight: 700; border: 1px solid var(--border); color: var(--muted); }

  .bangla-row { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
  .bangla-meaning { font-size: 0.85rem; color: #000fff; font-weight: 500; display: block; }
  .bangla-pronun { font-size: 0.78rem; color: var(--muted); font-style: italic; display: block; margin-top: 2px; }

  .card-actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
  .btn-audio { background: var(--card2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--text); cursor: pointer; font-size: 0.78rem; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
  .btn-audio:hover { background: #000; color: #fff; }
  .btn-learned { margin-left: auto; background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--muted); cursor: pointer; font-size: 0.74rem; transition: all 0.2s; }
  .btn-learned:hover { border-color: #000; color: #000; }
  .word-card.learned .btn-learned { background: #000; border-color: #000; color: #fff; }

  .quiz-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .quiz-overlay.open { display: flex; }
  .quiz-box { background: var(--card); border: 2px solid #000; border-radius: 16px; padding: 28px; width: 100%; max-width: 480px; text-align: center; }
  .quiz-progress { font-size: 0.78rem; color: var(--muted); margin-bottom: 16px; }
  .quiz-question { font-size: 1.4rem; font-weight: 700; color: #000; margin-bottom: 8px; }
  .quiz-hint { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .quiz-opt { background: var(--card2); border: 2px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; font-size: 0.88rem; color: var(--text); transition: all 0.2s; }
  .quiz-opt:hover { border-color: #000; }
  .quiz-opt.correct { background: #000; border-color: #000; color: #fff; font-weight: 700; }
  .quiz-opt.wrong { background: #ffe5e5; border-color: #cc0000; color: #cc0000; }
  .quiz-feedback { font-size: 0.9rem; min-height: 30px; margin-bottom: 12px; }
  .quiz-next { background: #000; border: none; border-radius: 8px; padding: 10px 28px; color: #fff; cursor: pointer; font-size: 0.9rem; font-weight: 700; }
  .quiz-close { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 8px 20px; color: var(--muted); cursor: pointer; font-size: 0.85rem; margin-top: 8px; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); display: flex; z-index: 40; }
  .nav-btn { flex: 1; padding: 12px 0; background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; }
  .nav-btn:hover, .nav-btn.active { color: #000; }
  .nav-icon { font-size: 1.2rem; }
  .pb { padding-bottom: 70px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 0.9rem; }

  @media(max-width:500px) {
    .word-grid { grid-template-columns: 1fr; }
    .quiz-options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>German A1 Vocabulary</h1>
  <span id="totalCount">935 শব্দ</span>
</header>

<div class="stats">
  <div class="stat-item"><b id="sLearned">0</b>শেখা হয়েছে</div>
  <div class="stat-item"><b id="sRemain">935</b>বাকি আছে</div>
  <div class="stat-item"><b id="sKapitel">9</b>অধ্যায়</div>
  <div class="stat-item"><b id="sPct">0%</b>সম্পন্ন</div>
</div>

<div class="controls">
  <input class="search-box" type="text" id="searchInput" placeholder="শব্দ খুঁজুন... (German বা Bangla)"/>
  <button class="filter-btn active" id="btnAll" onclick="setFilter('all')">সব</button>
  <button class="filter-btn" id="btnUnlearned" onclick="setFilter('unlearned')">বাকি</button>
  <button class="filter-btn" id="btnLearned" onclick="setFilter('learned')">শেখা</button>
  <button class="filter-btn" style="background:#000;color:#fff;font-weight:700;" onclick="startQuiz()">Quiz</button>
</div>

<div class="select-row">
  <select class="dropdown" id="chapterSelect" onchange="onChapterChange()">
    <option value="all">সব অধ্যায় (Kapitel 1-9)</option>
  </select>
  <select class="dropdown" id="categorySelect" onchange="onCategoryChange()">
    <option value="all">All categories</option>
  </select>
</div>

<div class="content pb" id="mainContent"></div>

<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-box">
    <div class="quiz-progress" id="qProgress">প্রশ্ন ১/১০</div>
    <div class="quiz-question" id="qQuestion"></div>
    <div class="quiz-hint" id="qHint"></div>
    <div class="quiz-options" id="qOptions"></div>
    <div class="quiz-feedback" id="qFeedback"></div>
    <button class="quiz-next" id="qNext" onclick="nextQuiz()" style="display:none">পরের প্রশ্ন →</button>
    <br/>
    <button class="quiz-close" onclick="closeQuiz()">✕ বন্ধ করো</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="scrollToTop()"><span class="nav-icon">📚</span>শব্দ</button>
  <button class="nav-btn" onclick="startQuiz()"><span class="nav-icon">🎯</span>Quiz</button>
  <button class="nav-btn" onclick="speakRandom()"><span class="nav-icon">🔊</span>শুনো</button>
  <button class="nav-btn" onclick="resetAll()"><span class="nav-icon">🔄</span>রিসেট</button>
</div>

let learnedSet = new Set(JSON.parse(localStorage.getItem('learned_v3') || '[]'));
let currentChapter = 'all';
let currentCategory = 'all';
let currentFilter = 'all';
let searchQuery = '';
let quizWords = [], quizIdx = 0, quizScore = 0;

function saveProgress() {
  localStorage.setItem('learned_v3', JSON.stringify([...learnedSet]));
  updateStats();
}

function updateStats() {
  const total = 935;
  const learned = learnedSet.size;
  document.getElementById('sLearned').textContent = learned;
  document.getElementById('sRemain').textContent = total - learned;
  document.getElementById('sPct').textContent = Math.round(learned/total*100) + '%';
}

function cleanForTTS(word) {
  return word.replace(/^(der|die|das)\s+/,'').replace(/\(.*?\)/g,'').trim();
}

function getArticleClass(word) {
  if (/^der\s/.test(word)) return 'der';
  if (/^die\s/.test(word)) return 'die';
  if (/^das\s/.test(word)) return 'das';
  return null;
}

function speakWord(word) {
  const clean = cleanForTTS(word);
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'de-DE';
  utt.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function speakRandom() {
  const allWords = [];
  Object.values(VOCAB).forEach(ch => Object.values(ch).forEach(words => allWords.push(...words)));
  const w = allWords[Math.floor(Math.random()*allWords.length)];
  speakWord(w);
}

function buildChapterSelect() {
  const sel = document.getElementById('chapterSelect');
  Object.keys(VOCAB).forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch;
    opt.textContent = ch;
    sel.appendChild(opt);
  });
}

function buildCategorySelect() {
  const sel = document.getElementById('categorySelect');
  sel.innerHTML = '<option value="all">All categories</option>';
  const chapters = currentChapter === 'all' ? Object.keys(VOCAB) : [currentChapter];
  const seen = new Set();
  chapters.forEach(ch => {
    Object.keys(VOCAB[ch]).forEach(cat => {
      if (!seen.has(cat)) {
        seen.add(cat);
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        sel.appendChild(opt);
      }
    });
  });
}

function onChapterChange() {
  currentChapter = document.getElementById('chapterSelect').value;
  currentCategory = 'all';
  buildCategorySelect();
  render();
}

function onCategoryChange() {
  currentCategory = document.getElementById('categorySelect').value;
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const id = 'btn' + f.charAt(0).toUpperCase() + f.slice(1);
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');
  render();
}

function toggleLearned(wordKey) {
  if (learnedSet.has(wordKey)) {
    learnedSet.delete(wordKey);
  } else {
    learnedSet.add(wordKey);
  }
  saveProgress();
  render();
}

function render() {
  const content = document.getElementById('mainContent');
  const q = searchQuery.toLowerCase();
  let html = '';
  let totalShown = 0;

  const chaptersToShow = currentChapter === 'all' ? Object.keys(VOCAB) : [currentChapter];

  chaptersToShow.forEach(ch => {
    const cats = VOCAB[ch];
    let chapHtml = '';
    Object.entries(cats).forEach(([cat, words]) => {
      if (currentCategory !== 'all' && currentCategory !== cat) return;

      const filtered = words.filter(w => {
        const bn = BANGLA[w] || ['',''];
        const matchSearch = !q || w.toLowerCase().includes(q) || bn[0].toLowerCase().includes(q) || bn[1].toLowerCase().includes(q);
        const isLearned = learnedSet.has(w);
        const matchFilter = currentFilter === 'all' || (currentFilter === 'learned' && isLearned) || (currentFilter === 'unlearned' && !isLearned);
        return matchSearch && matchFilter;
      });
      if (!filtered.length) return;
      totalShown += filtered.length;

      const cardsHtml = filtered.map(w => {
        const isLearned = learnedSet.has(w);
        const articleCls = getArticleClass(w);
        const bn = BANGLA[w] || ['',''];
        const meaning = bn[0] || '';
        const pronun = bn[1] || '';
        const articleBadge = articleCls ? '<span class="article-badge">' + articleCls + '</span>' : '';
        const safeW = w.replace(/'/g, "\\'");

        return '<div class="word-card ' + (isLearned?'learned':'') + '">' +
          '<div class="badge">✓ শেখা</div>' +
          '<div class="german-word">' + articleBadge + w + '</div>' +
          (meaning ? '<div class="bangla-row"><span class="bangla-meaning">' + meaning + '</span><span class="bangla-pronun">(' + pronun + ')</span></div>' : '') +
          '<div class="card-actions">' +
          '<button class="btn-audio" onclick="speakWord(\'' + safeW + '\')">🔊 শুনো</button>' +
          '<button class="btn-learned" onclick="toggleLearned(\'' + safeW + '\')">' + (isLearned ? '✓ শেখা' : '+ শিখেছি') + '</button>' +
          '</div></div>';
      }).join('');

      chapHtml += '<div class="category-block">' +
        '<div class="category-title">' + cat + '<span class="category-count">' + filtered.length + ' টি</span></div>' +
        '<div class="word-grid">' + cardsHtml + '</div></div>';
    });

    if (chapHtml) {
      if (currentChapter === 'all') {
        html += '<h2 style="color:#000;font-size:1rem;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid #000;">' + ch + '</h2>';
      }
      html += chapHtml;
    }
  });

  if (!totalShown) {
    html = '<div class="empty">কোনো শব্দ পাওয়া যায়নি।<br><small>অন্য কিছু খুঁজুন।</small></div>';
  }

  content.innerHTML = html;
}

function startQuiz() {
  const allWords = [];
  Object.entries(VOCAB).forEach(([ch, cats]) =>
    Object.values(cats).forEach(words => allWords.push(...words.filter(w => BANGLA[w])))
  );
  for (let i = allWords.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [allWords[i],allWords[j]] = [allWords[j],allWords[i]];
  }
  quizWords = allWords.slice(0, 10);
  quizIdx = 0; quizScore = 0;
  document.getElementById('quizOverlay').classList.add('open');
  showQuizQuestion();
}

function showQuizQuestion() {
  if (quizIdx >= quizWords.length) {
    showQuizResult(); return;
  }
  const word = quizWords[quizIdx];
  const correctMeaning = (BANGLA[word] || ['',''])[0];

  const allMeanings = Object.values(BANGLA).map(v => v[0]).filter(m => m && m !== correctMeaning);
  const shuffled = allMeanings.sort(() => Math.random()-0.5).slice(0,3);
  const options = [correctMeaning, ...shuffled].sort(() => Math.random()-0.5);

  document.getElementById('qProgress').textContent = 'প্রশ্ন ' + (quizIdx+1) + '/' + quizWords.length + ' | স্কোর: ' + quizScore;
  document.getElementById('qQuestion').textContent = word;
  document.getElementById('qHint').textContent = 'এই জার্মান শব্দের বাংলা অর্থ কী?';
  document.getElementById('qFeedback').textContent = '';
  document.getElementById('qNext').style.display = 'none';

  const optDiv = document.getElementById('qOptions');
  optDiv.innerHTML = options.map(opt => {
    const safeOpt = opt.replace(/'/g, "\\'");
    const safeCorrect = correctMeaning.replace(/'/g, "\\'");
    const safeWord = word.replace(/'/g, "\\'");
    return '<button class="quiz-opt" onclick="checkAnswer(this,\'' + safeOpt + '\',\'' + safeCorrect + '\',\'' + safeWord + '\')">' + opt + '</button>';
  }).join('');
}

function checkAnswer(btn, chosen, correct, word) {
  document.querySelectorAll('.quiz-opt').forEach(b => b.style.pointerEvents='none');
  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('qFeedback').innerHTML = '<span style="color:#000;font-weight:700;">✓ সঠিক!</span>';
    quizScore++;
    if (!learnedSet.has(word)) { learnedSet.add(word); saveProgress(); }
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(b => { if (b.textContent.trim() === correct) b.classList.add('correct'); });
    document.getElementById('qFeedback').innerHTML = '<span style="color:#cc0000;">✗ ভুল। সঠিক: ' + correct + '</span>';
  }
  document.getElementById('qNext').style.display = 'inline-block';
}

function nextQuiz() {
  quizIdx++;
  showQuizQuestion();
}

function showQuizResult() {
  const pct = Math.round(quizScore/quizWords.length*100);
  document.getElementById('quizOverlay').innerHTML =
    '<div class="quiz-box" style="text-align:center">' +
    '<h2 style="color:#000;margin-bottom:8px;">Quiz শেষ!</h2>' +
    '<p style="color:#000;font-size:1.4rem;margin-bottom:6px;">' + quizScore + '/' + quizWords.length + '</p>' +
    '<p style="color:var(--muted);margin-bottom:20px;">' + pct + '% সঠিক</p>' +
    '<p style="font-size:0.85rem;color:var(--text);margin-bottom:20px;">' + (pct>=70?'দারুণ! তুমি ভালো করেছ!':'আরো প্র্যাকটিস করো!') + '</p>' +
    '<button class="quiz-next" onclick="startQuiz()">আবার খেলো</button><br><br>' +
    '<button class="quiz-close" onclick="closeQuiz()">বন্ধ করো</button></div>';
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('open');
  document.getElementById('quizOverlay').innerHTML =
    '<div class="quiz-box">' +
    '<div class="quiz-progress" id="qProgress"></div>' +
    '<div class="quiz-question" id="qQuestion"></div>' +
    '<div class="quiz-hint" id="qHint"></div>' +
    '<div class="quiz-options" id="qOptions"></div>' +
    '<div class="quiz-feedback" id="qFeedback"></div>' +
    '<button class="quiz-next" id="qNext" onclick="nextQuiz()" style="display:none">পরের প্রশ্ন →</button>' +
    '<br/><button class="quiz-close" onclick="closeQuiz()">✕ বন্ধ করো</button></div>';
}

function resetAll() {
  if (confirm('সব progress মুছে দেব? নিশ্চিত?')) {
    learnedSet.clear();
    saveProgress();
    render();
  }
}

function scrollToTop() { window.scrollTo({top:0,behavior:'smooth'}); }

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

buildChapterSelect();
buildCategorySelect();
updateStats();
render();
</script>
</body>
</html>
